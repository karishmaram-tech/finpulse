name: FinPulse CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ---------------------------------------------------------------------
  # Lint: fail fast on style/correctness issues before running anything else
  # ---------------------------------------------------------------------
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run ruff check
        run: ruff check finpulse/ main.py tests/

      - name: Run ruff format check
        run: ruff format --check finpulse/ main.py tests/

  # ---------------------------------------------------------------------
  # Test: unit tests with coverage, gated behind lint passing
  # ---------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run pytest with coverage
        run: pytest tests/ -v --cov=finpulse --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ---------------------------------------------------------------------
  # Build: build and smoke-test the Docker image, gated behind tests passing
  # ---------------------------------------------------------------------
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (not pushed — validation only)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: finpulse:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Smoke-test container boots
        run: |
          docker run -d --name finpulse-smoke \
            -e GROQ_API_KEY="${{ secrets.GROQ_API_KEY_SMOKE_TEST }}" \
            -p 7777:7777 \
            finpulse:ci-${{ github.sha }}
          sleep 8
          curl -f http://localhost:7777/docs || (docker logs finpulse-smoke && exit 1)
          docker stop finpulse-smoke

  # ---------------------------------------------------------------------
  # Deploy note: Render.com auto-deploys on push to main once the service
  # is connected to this GitHub repo (configured in the Render dashboard,
  # via render.yaml). No deploy job needed here — build/test gate merges,
  # Render handles the actual deployment trigger.
  # ---------------------------------------------------------------------
