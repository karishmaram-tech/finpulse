# Prometheus scrape configuration for FinPulse
# Scrapes the /observability/metrics endpoint every 15 seconds

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: finpulse

scrape_configs:
  - job_name: finpulse
    static_configs:
      - targets:
          - finpulse:7777      # Docker service name resolves internally
    metrics_path: /observability/metrics
    scrape_interval: 15s
    scrape_timeout: 10s
