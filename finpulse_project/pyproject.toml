[tool.ruff]
line-length = 100
target-version = "py312"
exclude = ["__pycache__", ".venv", "venv"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP"]
ignore = ["E501"]  # line length handled by formatter, not a hard lint failure

[tool.ruff.format]
quote-style = "double"

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
