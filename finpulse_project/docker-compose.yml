# =============================================================================
# FinPulse — Local Observability Stack
# Spins up FinPulse + Prometheus + Grafana together for local development.
#
# Usage:
#   export GROQ_API_KEY=gsk_your_key   (Windows: $env:GROQ_API_KEY="gsk_...")
#   docker-compose up
#
# Then open:
#   http://localhost:7777/docs          — FinPulse API
#   http://localhost:9090               — Prometheus
#   http://localhost:3000               — Grafana (admin / finpulse)
# =============================================================================

version: "3.9"

services:

  finpulse:
    build: .
    container_name: finpulse-api
    ports:
      - "7777:7777"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      FINPULSE_HOST: "0.0.0.0"
      FINPULSE_PORT: "7777"
      FINPULSE_LOG_LEVEL: "INFO"
      DATABASE_URL: "sqlite:///finpulse.db"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7777/docs')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - finpulse-net

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: finpulse-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    depends_on:
      finpulse:
        condition: service_healthy
    networks:
      - finpulse-net

  grafana:
    image: grafana/grafana:10.4.0
    container_name: finpulse-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: finpulse
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/finpulse.json
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - finpulse-net

networks:
  finpulse-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
